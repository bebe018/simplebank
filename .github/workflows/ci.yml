name: ci-test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:                
    name: Test         
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go 1.25.2
        uses: actions/setup-go@v2
        with:
          go-version: ^1.25

      - name: Check out code into the Go module directory
        uses: actions/checkout@v2

      - name: Test
        run: make test